apiVersion: v1
kind: Service
metadata:
  name: client
  # namespace: default
spec:
  selector:
    app: client
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  # namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service-upstreams: "echo:1234"
    spec:
      containers:
      - name: client
        image: curlimages/curl:8.6.0
        command: ["sh","-lc","sleep 360000"]
        ports:
        - containerPort: 80

