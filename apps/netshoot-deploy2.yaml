apiVersion: apps/v1
kind: Deployment
metadata:
  name: netshoot2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netshoot2
  template:
    metadata:
      labels:
        app: netshoot2
      annotations:
        consul.hashicorp.com/connect-inject: "false"
    spec:
      containers:
        - name: netshoot
          image: nicolaka/netshoot
          command: ["sleep","3600"]
          # securityContext:
          #   runAsUser: 0
          #   runAsGroup: 0
          #   privileged: true
          #   allowPrivilegeEscalation: true