apiVersion: v1
kind: Service
metadata:
  name: echo2
  # namespace: default
spec:
  selector:
    app: echo2
  ports:
  - name: http
    port: 5678
    targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo2
  # namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo2
  template:
    metadata:
      labels:
        app: echo2
      annotations:
        consul.hashicorp.com/connect-inject: "false"
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo:1.0
        args: ["-text=hello-from-echo2"]
        ports:
        - containerPort: 5678